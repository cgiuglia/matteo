<head>

    <style>
	@import url('https://googleapis.com');	        
        body {
            background-color: #ffffff;
            color: #1d3557;
            overflow-x: hidden;
	    font-family: 'Montserrat', sans-serif;
        }

        h1{
            font-family: 'Luckiest Guy', cursive;

        p {

            color: #1d3557;
	    font-weight:500
        }
        .info-highlight {
            
            font-weight: 700;
            color: #457b9d;
        }
        
        /* Envelope styling */
        .envelope-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            min-height: 500px;
        }
        
        .envelope {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            transition: all 1s ease;
            z-index: 10;
            background-color: #1d3557;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .envelope.hidden-envelope {
            opacity: 0;
            transform: translateY(-100px);
            pointer-events: none;
            visibility: hidden;
        }
        
        .envelope-back {
            background-color: #1d3557;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .envelope-flap {
            position: absolute;
            width: 100%;
            height: 50%;
	    top: 0;
	    left: 0;
	    background-color: #1d3557;
	    transform-origin: top;
            transition: transform 1s ease;
            transform: rotateX(0deg);
            border-radius: 8px 8px 0 0;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            overflow: hidden;
	    z-index: 20;
        }

        .envelope-flap.open {
            transform: rotateX(180deg);
        }
        
        .envelope-content {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
	    min-height: 120%
            background-color: #ffffff;
	    background-size: contain;
	    background-repeat: no-repeat;
	    background-position: center;
	    display: flex;
	    flex-direction: column;
            justify-content: center;    /* centra verticalmente */
            align-items: center;        /* centra orizzontalmente */
            text-align: center;
            padding: 20px;
	    padding-top: 60px;
            transform: translateY(0);
            transition: all 1s ease;
            z-index: 5;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            max-height: 80vh;
	    border: 4px solid #e63946;
	     
        }
        
        .envelope-content.out {
            transform: translateY(-80%);
        }
        
        .envelope-content.expanded {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: none;
            z-index: 40;
        }
        
        /* Wax seal styling */
        .wax-seal {
            width: 250px;
            height: 250px;
	    background-image: url('ProgettoSenzaTitolo.png');
	    background-size: cover;
            background-position: center;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            cursor: pointer;
            transition: all 0.3s ease;
	    /* realistic effects */
	    box-shadow:
	        inset -2px -2px 6px rgba(0,0,0,0.2),
	        inset 2px 2px 6px rgba(255,255,255,0.2),
	        0 4px 8px rgba(0,0,0,0.3);
            border: 2px solid #b8860b;
	    background-blend-mode: overlay;
        }
        
        .wax-seal:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        
        .wax-seal:active {
            transform: translate(-50%, -50%) scale(0.98);
        }
        

        
        /* Pulse animation for wax seal */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(139, 0, 0, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(139, 0, 0, 0);
            }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        

        /* Confetti animation */
        .confetti {
            position: absolute;
            top: 0;
	    width: 10px;
            height: 10px;
            opacity: 1;
	
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        
        /* Divider styling */
        .divider {
            position: relative;
            height: 180 px;
            background: none;
            margin: 1.5rem 0;
	    display: flex;
	    justify-content: center;
	    align-items: center;
        }
        
        .divider::before {
            content: '';
            position: absolute;
	    width: 350px;
	    height: 130px;
	    background-image: url('Auguri.png');
	    background-size: contain;
	    background-repeat: no-repeat;
	    background-position: center;
	    border: none;
	    box-shadow: none;
        }
/*iniziali*/
        .iniziali {
           position: relative;
           min-height: 120px;
           background: none;
           margin-top: 4rem;
           display: flex;
           justify-content: center;
           align-items: center;
        }
        .iniziali::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 350px;
            background-image: url('InizialiMat.png');
            background-size: contain;
	    background-repeat: no-repeat;
            background-position: center;
            border: none;
            box-shadow: none;
        }
        
        /* Location icon styling */
        .location-icon {
            color: #3366cc	;
            margin-right: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .location-icon:hover {
            color: #3366cc	;
            transform: scale(1.1);
        }
        
        /* Address with icon container */
        .address-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        


        /* Map styling */
        .map-container {
            width: 100%;
            height: 300px;
            background-color: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            margin-top: 1rem;
        }
        
        .map-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            text-align: center;
        }
        
        .map-icon {
            font-size: 3rem;
            color: #a6c1ee;
            margin-bottom: 1rem;
        }

	
        

    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[#f0f4f8]">

            </button>

        <!-- Card Content -->

        <!-- Spazio iniziale -->
	<div class="mt-80 w-full flex flex-col items-center">

		      <div class="divider w-full" style="height:180px;"></div>

    <div class="h-2"></div> 

        <div class="text-center px-4 ">

        <!-- RSVP Confirmation -->

    <div id="confetti-container" class="pointer-events-none fixed top-0 left-0 w-full h-full z-[99999] overflow-hidden"></div>
    


    <script>
        // Attendi che il DOM sia completamente caricato
        document.addEventListener('DOMContentLoaded', function() {
            // Elementi DOM
            const envelope = document.getElementById('envelope');
            const waxSeal = document.getElementById('wax-seal');
            const envelopeFlap = document.getElementById('envelope-flap');
            const invitationCard = document.getElementById('invitation-card');
            const rsvpConfirmation = document.getElementById('rsvp-confirmation');
            const confirmationMessage = document.getElementById('confirmation-message');
            const confettiContainer = document.getElementById('confetti-container');

            // Assicurati che l'invito sia completamente nascosto all'inizio
            invitationCard.style.transform = 'translateY(100%)';
            
            let isOpen = false;
            let isAnimating = false;
            
            // Funzione per aprire la busta
            function openEnvelope() {
                if (isOpen || isAnimating) return;
                
         
                isAnimating = true;
                
                // Apri il lembo della busta
                envelopeFlap.classList.add('open');
                createConfetti(); 
                // Dopo un breve ritardo, estrai la carta
                setTimeout(() => {
                   
                    invitationCard.style.transform = 'translateY(0)';
                    invitationCard.classList.add('out');
                    
                    // Dopo che la carta è uscita, fai scomparire la busta
                    setTimeout(() => {
                       
                        envelope.classList.add('hidden-envelope');
                        
                        // Espandi la carta per occupare tutto lo spazio
                        setTimeout(() => {
                           
                            invitationCard.classList.add('expanded');
                            isOpen = true;
                            isAnimating = false;
                        }, 500);
                    }, 800);
                }, 800);
            }
            
            // Funzione per mostrare il messaggio di conferma
            function showConfirmation(message) {
                confirmationMessage.textContent = message;
                rsvpConfirmation.classList.remove('hidden');
                
                // Nascondi il messaggio dopo 5 secondi
                setTimeout(() => {
                    rsvpConfirmation.classList.add('hidden');
                }, 5000);
            }
            
            
            // Funzione per creare animazione dei coriandoli
            function createConfetti() {
                const colors = ['#e63946', '#1d3557', '#f1c40f', '#457b9d'];
                
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    
                    const size = Math.random() * 10 + 5;
                    confetti.style.width = size + 'px';
                    confetti.style.height = size + 'px';
                    
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    
                    confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                    
                    confettiContainer.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 5000);
                }
            }
            
            // Event listeners
            waxSeal.addEventListener('click', function() {
                openEnvelope();
        });
	 });
    </script>
